<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Books — Cable Leaf</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #2d5a3d;
      --green-light: #e8f0ea;
      --green-mid: #4a7c5e;
      --ink: #111810;
      --ink-soft: #3d4a3f;
      --mist: #f5f7f5;
      --white: #ffffff;
      --border: #d8e2da;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--mist);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 999;
      height: 60px;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .logo {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 22px;
      color: #111810;
      text-decoration: none;
    }

    .header-links {
      display: flex;
      gap: 24px;
      align-items: center;
      list-style: none;
    }

    .header-links a {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
    }

    .header-links a:hover { color: var(--green); }

    .header-links .cta {
      background: var(--green);
      color: #ffffff !important;
      padding: 7px 16px;
      border-radius: 4px;
      font-weight: 500;
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: #111810;
      border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 60px; left: 0; right: 0;
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      z-index: 998;
      flex-direction: column;
    }

    .mobile-menu.open { display: flex; }

    .mobile-menu a {
      display: block;
      padding: 16px 24px;
      font-size: 16px;
      color: var(--ink-soft);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }

    .mobile-menu a:last-child {
      border-bottom: none;
      background: var(--green);
      color: #ffffff;
      font-weight: 500;
      text-align: center;
      margin: 12px 16px 16px;
      border-radius: 4px;
    }

    /* PAGE */
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 84px 24px 60px;
    }

    /* GENRE FILTER */
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 36px;
    }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: #ffffff;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 13px;
      color: var(--ink-soft);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: var(--green); color: var(--green); }
    .filter-btn.active { background: var(--green); color: #ffffff; border-color: var(--green); }

    /* NEW THIS WEEK BANNER */
    .new-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .new-badge {
      background: var(--green);
      color: #ffffff;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .new-banner p {
      font-size: 13px;
      color: var(--ink-soft);
      font-weight: 300;
    }

    /* BOOK GRID */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }

    /* BOOK CARD */
    .book-card {
      background: #ffffff;
      border-radius: 8px;
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
    }

    .book-card:hover {
      box-shadow: 0 8px 24px rgba(45,90,61,0.1);
      transform: translateY(-3px);
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .book-cover-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      background: linear-gradient(135deg, var(--green-light) 0%, #d0e4d8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .book-cover-placeholder span {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.1rem;
      color: var(--green);
      text-align: center;
      line-height: 1.3;
    }

    .book-info {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .book-genre {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 6px;
    }

    .book-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.05rem;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .book-author {
      font-size: 12px;
      color: var(--ink-soft);
      font-weight: 300;
      margin-bottom: 10px;
    }

    .book-blurb {
      font-size: 12px;
      color: var(--ink-soft);
      font-weight: 300;
      line-height: 1.55;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .btn-read {
      flex: 1;
      background: var(--green);
      color: #ffffff;
      border: none;
      padding: 8px;
      border-radius: 4px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-read:hover { background: var(--green-mid); }

    .btn-save {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: border-color 0.2s;
      flex-shrink: 0;
    }

    .btn-save:hover { border-color: var(--green); }
    .btn-save.saved { background: var(--green-light); border-color: var(--green); }

    /* EMPTY / LOADING STATES */
    .state-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
      font-weight: 300;
    }

    .state-msg p { font-size: 1rem; margin-top: 8px; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: #ffffff;
      border-radius: 10px;
      max-width: 680px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--ink-soft);
      line-height: 1;
      z-index: 1;
    }

    .modal-cover {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 10px 10px 0 0;
    }

    .modal-cover-placeholder {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, var(--green-light) 0%, #d0e4d8 100%);
      border-radius: 10px 10px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-cover-placeholder span {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.5rem;
      color: var(--green);
    }

    .modal-body { padding: 28px; }

    .modal-genre {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 8px;
    }

    .modal-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.75rem;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .modal-author {
      font-size: 14px;
      color: var(--ink-soft);
      font-weight: 300;
      margin-bottom: 20px;
    }

    .modal-section-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green-mid);
      margin-bottom: 10px;
      margin-top: 24px;
    }

    .modal-blurb {
      font-size: 15px;
      color: var(--ink-soft);
      font-weight: 300;
      line-height: 1.75;
    }

    .modal-sample {
      font-size: 15px;
      color: var(--ink);
      line-height: 1.85;
      white-space: pre-wrap;
      font-weight: 300;
      border-left: 3px solid var(--green-light);
      padding-left: 20px;
      margin-top: 8px;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
    }

    .btn-get {
      flex: 1;
      background: var(--green);
      color: #ffffff;
      padding: 12px 20px;
      border-radius: 4px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      text-align: center;
      border: none;
      cursor: pointer;
    }

    .btn-save-modal {
      padding: 12px 20px;
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 4px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      color: var(--ink-soft);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .btn-save-modal:hover { border-color: var(--green); color: var(--green); }
    .btn-save-modal.saved { background: var(--green-light); border-color: var(--green); color: var(--green); }

    /* SAVED LIST PANEL */
    .saved-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 500;
    }

    .saved-toggle {
      background: var(--green);
      color: #ffffff;
      border: none;
      padding: 12px 20px;
      border-radius: 24px;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(45,90,61,0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .saved-count {
      background: #ffffff;
      color: var(--green);
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .saved-drawer {
      display: none;
      position: absolute;
      bottom: 52px;
      right: 0;
      width: 300px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .saved-drawer.open { display: block; }

    .saved-drawer-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.1rem;
      color: var(--ink);
    }

    .saved-drawer-empty {
      padding: 32px 20px;
      text-align: center;
      font-size: 13px;
      color: var(--ink-soft);
      font-weight: 300;
    }

    .saved-item {
      display: flex;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      align-items: center;
    }

    .saved-item:last-child { border-bottom: none; }

    .saved-item-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
      flex: 1;
    }

    .saved-item-author {
      font-size: 11px;
      color: var(--ink-soft);
      font-weight: 300;
    }

    .saved-item-remove {
      background: none;
      border: none;
      color: var(--ink-soft);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .header-links { display: none; }
      .hamburger { display: flex; }
      .book-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
      .saved-panel { bottom: 16px; right: 16px; }
      .saved-drawer { width: 260px; }
    }
  </style>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="icon" href="/favicon.ico">
</head>
<body>

  <!-- HEADER -->
  <header>
    <a href="index.html" class="logo">Cable Leaf</a>
    <ul class="header-links">
      <li><a href="browse.html">Browse books</a></li>
      <li><a href="upload.html">Submit your book</a></li>
      <li><a href="dashboard.html">My books</a></li>
      <li><a href="upload.html" class="cta">Submit your book</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <nav class="mobile-menu" id="mobileMenu">
    <a href="index.html">Home</a>
    <a href="browse.html">Browse books</a>
    <a href="dashboard.html">My books</a>
    <a href="upload.html">Submit your book</a>
  </nav>

  <!-- PAGE -->
  <main class="page">

    <!-- NEW THIS WEEK -->
    <div class="new-banner">
      <span class="new-badge" id="newBadge">New this week</span>
      <p id="newCount">Loading...</p>
    </div>

    <!-- GENRE FILTERS -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-genre="all">All genres</button>
      <button class="filter-btn" data-genre="Fiction">Fiction</button>
      <button class="filter-btn" data-genre="Literary Fiction">Literary Fiction</button>
      <button class="filter-btn" data-genre="Non-Fiction">Non-Fiction</button>
      <button class="filter-btn" data-genre="Mystery">Mystery</button>
      <button class="filter-btn" data-genre="Romance">Romance</button>
      <button class="filter-btn" data-genre="Sci-Fi">Sci-Fi</button>
      <button class="filter-btn" data-genre="Fantasy">Fantasy</button>
      <button class="filter-btn" data-genre="Thriller">Thriller</button>
      <button class="filter-btn" data-genre="Horror">Horror</button>
      <button class="filter-btn" data-genre="Young Adult">Young Adult</button>
      <button class="filter-btn" data-genre="Biography">Biography</button>
      <button class="filter-btn" data-genre="Memoir">Memoir</button>
      <button class="filter-btn" data-genre="Self-Help">Self-Help</button>
      <button class="filter-btn" data-genre="Poetry">Poetry</button>
    </div>

    <!-- BOOK GRID -->
    <div class="book-grid" id="bookGrid">
      <div class="state-msg">
        <div class="spinner"></div>
        <p>Loading books...</p>
      </div>
    </div>

  </main>

  <!-- BOOK MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">&#x2715;</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <!-- SAVED LIST -->
  <div class="saved-panel">
    <div class="saved-drawer" id="savedDrawer">
      <div class="saved-drawer-header">Your reading queue</div>
      <div id="savedList">
        <div class="saved-drawer-empty">No books saved yet.<br>Tap the bookmark on any book.</div>
      </div>
    </div>
    <button class="saved-toggle" id="savedToggle">
      <span>&#128278; Reading queue</span>
      <span class="saved-count" id="savedCount">0</span>
    </button>
  </div>

  <script>
    // ── SUPABASE ──
    const { createClient } = supabase;
    const sb = createClient(
      'https://zywuflscptoqzsuqgiun.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5d3VmbHNjcHRvcXpzdXFnaXVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMDQ4OTIsImV4cCI6MjA4OTY4MDg5Mn0.U6QsDC1GxtzTgfKOdNHgfFaugt0DK2uRYy6ILnFUs5c'
    );

    // ── STATE ──
    let allBooks = [];
    let currentGenre = 'all';
    let savedBooks = JSON.parse(localStorage.getItem('cl_saved') || '[]');
    let currentBook = null;

    // ── FETCH BOOKS ──
    async function loadBooks() {
      const { data, error } = await sb
        .from('books')
        .select('*')
        .eq('status', 'approved')
        .order('created_at', { ascending: false });

      if (error) {
        document.getElementById('bookGrid').innerHTML =
          '<div class="state-msg"><p>Could not load books. Please try again later.</p></div>';
        return;
      }

      allBooks = data || [];

      // New this week count
      const oneWeekAgo = new Date();
      oneWeekAgo.setDate(oneWeekAgo.getDate() - 7);
      const newCount = allBooks.filter(b => new Date(b.created_at) > oneWeekAgo).length;
      document.getElementById('newCount').textContent =
        newCount > 0 ? `${newCount} new book${newCount > 1 ? 's' : ''} added this week` : 'Discover something new';

      renderBooks();
    }

    // ── RENDER BOOKS ──
    function renderBooks() {
      const grid = document.getElementById('bookGrid');
      const filtered = currentGenre === 'all'
        ? allBooks
        : allBooks.filter(b => b.genre === currentGenre);

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="state-msg"><p>No books in this genre yet. Check back soon.</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(book => `
        <div class="book-card" onclick="openBook('${book.id}')">
          ${book.cover_url
            ? `<img class="book-cover" src="${book.cover_url}" alt="${book.title}" loading="lazy" />`
            : `<div class="book-cover-placeholder"><span>${book.title}</span></div>`
          }
          <div class="book-info">
            <span class="book-genre">${book.genre}</span>
            <div class="book-title">${book.title}</div>
            <div class="book-author">by ${book.author_name}</div>
            <div class="book-blurb">${book.blurb}</div>
            <div class="book-actions">
              <button class="btn-read" onclick="event.stopPropagation(); openBook('${book.id}')">Read sample</button>
              <button class="btn-save ${savedBooks.find(s => s.id === book.id) ? 'saved' : ''}"
                onclick="event.stopPropagation(); toggleSave('${book.id}')"
                title="Save to reading queue">&#128278;</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ── OPEN BOOK MODAL ──
    async function openBook(id) {
      const book = allBooks.find(b => b.id === id);
      if (!book) return;
      currentBook = book;

      // Track impression
      await sb.from('books').update({ impressions: (book.impressions || 0) + 1 }).eq('id', id);
      book.impressions = (book.impressions || 0) + 1;

      const isSaved = savedBooks.find(s => s.id === book.id);

      document.getElementById('modalContent').innerHTML = `
        ${book.cover_url
          ? `<img class="modal-cover" src="${book.cover_url}" alt="${book.title}" />`
          : `<div class="modal-cover-placeholder"><span>${book.title}</span></div>`
        }
        <div class="modal-body">
          <p class="modal-genre">${book.genre}</p>
          <h2 class="modal-title">${book.title}</h2>
          <p class="modal-author">by ${book.author_name}</p>

          <p class="modal-section-label">About this book</p>
          <p class="modal-blurb">${book.blurb}</p>

          <p class="modal-section-label">Sample chapter</p>
          <div class="modal-sample">${book.sample_chapter}</div>

          <div class="modal-footer">
            ${book.external_link
              ? `<a href="${book.external_link}" target="_blank" class="btn-get" onclick="trackClick('${book.id}')">Get this book ↗</a>`
              : `<button class="btn-get" disabled style="opacity:0.5;cursor:default;">Link coming soon</button>`
            }
            <button class="btn-save-modal ${isSaved ? 'saved' : ''}" id="modalSaveBtn"
              onclick="toggleSave('${book.id}'); updateModalSaveBtn('${book.id}')">
              ${isSaved ? '✓ Saved' : '+ Save to queue'}
            </button>
          </div>
        </div>
      `;

      document.getElementById('modalOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function updateModalSaveBtn(id) {
      const btn = document.getElementById('modalSaveBtn');
      if (!btn) return;
      const isSaved = savedBooks.find(s => s.id === id);
      btn.textContent = isSaved ? '✓ Saved' : '+ Save to queue';
      btn.classList.toggle('saved', !!isSaved);
    }

    // Track click
    async function trackClick(id) {
      const book = allBooks.find(b => b.id === id);
      if (!book) return;
      await sb.from('books').update({ clicks: (book.clicks || 0) + 1 }).eq('id', id);
      book.clicks = (book.clicks || 0) + 1;
    }

    // Close modal
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modalOverlay')) closeModal();
    });

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ── SAVE / UNSAVE ──
    function toggleSave(id) {
      const book = allBooks.find(b => b.id === id);
      if (!book) return;
      const idx = savedBooks.findIndex(s => s.id === id);
      if (idx > -1) {
        savedBooks.splice(idx, 1);
      } else {
        savedBooks.push({ id: book.id, title: book.title, author_name: book.author_name });
        // Track save
        sb.from('books').update({ saves: (book.saves || 0) + 1 }).eq('id', id);
        book.saves = (book.saves || 0) + 1;
      }
      localStorage.setItem('cl_saved', JSON.stringify(savedBooks));
      updateSavedUI();
      renderBooks();
    }

    function updateSavedUI() {
      document.getElementById('savedCount').textContent = savedBooks.length;
      const list = document.getElementById('savedList');
      if (savedBooks.length === 0) {
        list.innerHTML = '<div class="saved-drawer-empty">No books saved yet.<br>Tap the bookmark on any book.</div>';
        return;
      }
      list.innerHTML = savedBooks.map(s => `
        <div class="saved-item">
          <div>
            <div class="saved-item-title">${s.title}</div>
            <div class="saved-item-author">by ${s.author_name}</div>
          </div>
          <button class="saved-item-remove" onclick="toggleSave('${s.id}')" title="Remove">&#x2715;</button>
        </div>
      `).join('');
    }

    // ── SAVED PANEL TOGGLE ──
    document.getElementById('savedToggle').addEventListener('click', () => {
      document.getElementById('savedDrawer').classList.toggle('open');
    });

    // ── GENRE FILTER ──
    document.getElementById('filterBar').addEventListener('click', (e) => {
      if (!e.target.classList.contains('filter-btn')) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentGenre = e.target.dataset.genre;
      renderBooks();
    });

    // ── HAMBURGER ──
    document.getElementById('hamburger').addEventListener('click', function() {
      this.classList.toggle('open');
      document.getElementById('mobileMenu').classList.toggle('open');
    });

    // ── INIT ──
    loadBooks();
    updateSavedUI();
  </script>
</body>
</html>
